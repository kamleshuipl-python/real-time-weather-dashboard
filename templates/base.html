<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Real-Time Weather Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<header>
    <h1>Real-Time Weather Dashboard</h1>
    <nav>
        <a href="{{ url_for('main.index') }}">Home</a> | 
        <a href="{{ url_for('main.all_cities') }}">All Cities</a> |

        <a href="{{ url_for('main.about') }}">About</a>
    </nav>
</header>
<main>
    {% block content %}{% endblock %}
</main>
<footer>
    <p>&copy; 2026 Real-Time Weather Dashboard</p>
</footer>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
<script src="{{ url_for('static', filename='js/effects.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
